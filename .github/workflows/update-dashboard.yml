name: Atualiza dashboard PETR4

on:
  schedule:
    - cron: "0 12 * * 6"   # sábados 12:00 UTC (9h em Brasília)
  workflow_dispatch: {}     # permite rodar manualmente na aba Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Atualiza dados
        run: |
          pip install requests
          python scripts/update_dashboard.py

      - name: Commita se houver mudança
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          git diff --cached --quiet || git commit -m "Atualiza dados do dashboard (rotina semanal)"
          git push

      - name: Envia e-mail com o dashboard
        if: success()
        continue-on-error: true   # não falha o workflow se os secrets de e-mail não existirem
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Dashboard PETR4 atualizado — rotina semanal"
          to: jmagomez@gmail.com
          from: "Projeto Bloomberg <${{ secrets.MAIL_USERNAME }}>"
          html_body: |
            <p>O dashboard da PETR4 foi atualizado com os dados desta semana.</p>
            <p><a href="https://jmagomez.github.io/projeto_bloomberg/">Abrir dashboard atualizado</a></p>
            <p>Anexos: página do dashboard e dados da semana.</p>
          attachments: index.html,data.js
